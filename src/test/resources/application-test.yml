# Profil test : H2 en mémoire, sans Redis ni SMTP (chargement du contexte Spring)
spring:
  datasource:
    url: jdbc:h2:mem:darquran_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379

  security:
    jwt:
      secret-key: test-secret-key-for-unit-tests-min-256-bits-required-so-padding-here
      expiration: 86400000
      refresh-token:
        expiration: 604800000

app:
  mail:
    from: test@example.com
  front-url: http://localhost:4200
  live:
    hls-base-url: http://localhost:8081/hls
    rtmp-server-url: rtmp://localhost:1935/live
