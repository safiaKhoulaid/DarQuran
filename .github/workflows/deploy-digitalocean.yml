name: CI/CD - Deploy DarQuran (DigitalOcean)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test

  deploy:
    environment:  DO_HOST
    name: Deploy on DigitalOcean via SSH
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.DO_HOST }}" ]; then
            echo "Missing required secret: DO_HOST (droplet IP / domain)"
            exit 1
          fi
          if [ -z "${{ secrets.DO_SSH_USER }}" ]; then
            echo "Missing required secret: DO_SSH_USER"
            exit 1
          fi
          if [ -z "${{ secrets.DO_SSH_PASSWORD }}" ]; then
            echo "Missing required secret: DO_SSH_PASSWORD (SSH password)"
            exit 1
          fi
          if [ -z "${{ secrets.DO_APP_PATH }}" ]; then
            echo "Missing required secret: DO_APP_PATH (ex: /opt/darquran)"
            exit 1
          fi

      - name: SSH deploy + docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          password: ${{ secrets.DO_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_PATH="${{ secrets.DO_APP_PATH }}"
            REPO_NAME="${{ github.repository }}"
            REPO_URL="${{ secrets.DO_GIT_REPO_URL }}"

            if [ -z "$APP_PATH" ]; then
              echo "Missing secret DO_APP_PATH"
              exit 1
            fi

            if [ -z "$REPO_URL" ]; then
              REPO_URL="https://github.com/safiaKhoulaid/DarQuran"
            fi

            # Prépare le dossier applicatif
            mkdir -p "$APP_PATH"
            if [ ! -f "$APP_PATH/docker-compose.yml" ]; then
              echo "Cloning repo into $APP_PATH"
              rm -rf "$APP_PATH"/*
              git clone "$REPO_URL" "$APP_PATH"
            else
              echo "Updating repo in $APP_PATH"
              cd "$APP_PATH"
              git fetch --all
              # reset dur pour éviter les divergences (CI/CD déterministe)
              git reset --hard origin/${{ github.ref_name }} || true
              git checkout -f ${{ github.ref_name }} || true
              git pull --ff-only || true
            fi

            # Fichier .env pour docker-compose (variables ${...} dans docker-compose.yml)
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"

            # --- Mail (optionnel) ---
            SPRING_MAIL_HOST="${{ secrets.SPRING_MAIL_HOST }}"
            SPRING_MAIL_PORT="${{ secrets.SPRING_MAIL_PORT }}"
            SPRING_MAIL_USERNAME="${{ secrets.SPRING_MAIL_USERNAME }}"
            SPRING_MAIL_PASSWORD="${{ secrets.SPRING_MAIL_PASSWORD }}"
            APP_MAIL_FROM="${{ secrets.APP_MAIL_FROM }}"

            # --- Front URL (optionnel) ---
            FRONT_URL="${{ secrets.FRONT_URL }}"

            # --- S3/MinIO (optionnel) ---
            S3_ENABLED="${{ secrets.S3_ENABLED }}"
            S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}"
            S3_REGION="${{ secrets.S3_REGION }}"
            S3_ACCESS_KEY="${{ secrets.S3_ACCESS_KEY }}"
            S3_SECRET_KEY="${{ secrets.S3_SECRET_KEY }}"
            S3_BUCKET="${{ secrets.S3_BUCKET }}"
            S3_PUBLIC_BASE_URL="${{ secrets.S3_PUBLIC_BASE_URL }}"

            # Valeurs par défaut robustes (si secrets optionnels non renseignés)
            if [ -z "$SPRING_MAIL_PORT" ]; then SPRING_MAIL_PORT="587"; fi
            if [ -z "$S3_ENABLED" ]; then S3_ENABLED="true"; fi
            if [ -z "$S3_ENDPOINT" ]; then S3_ENDPOINT="http://minio:9000"; fi
            if [ -z "$S3_REGION" ]; then S3_REGION="us-east-1"; fi
            if [ -z "$S3_ACCESS_KEY" ]; then S3_ACCESS_KEY="minioadmin"; fi
            if [ -z "$S3_SECRET_KEY" ]; then S3_SECRET_KEY="minioadmin"; fi
            if [ -z "$S3_BUCKET" ]; then S3_BUCKET="darquran-media"; fi
            if [ -z "$S3_PUBLIC_BASE_URL" ]; then S3_PUBLIC_BASE_URL="http://localhost:9000/darquran-media"; fi

            ENV_FILE="$APP_PATH/.env"
            echo "# ---- DB / JWT ----" > "$ENV_FILE"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> "$ENV_FILE"
            echo "JWT_SECRET=$JWT_SECRET" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            echo "# ---- Mail (optionnel) ----" >> "$ENV_FILE"
            echo "SPRING_MAIL_HOST=$SPRING_MAIL_HOST" >> "$ENV_FILE"
            echo "SPRING_MAIL_PORT=$SPRING_MAIL_PORT" >> "$ENV_FILE"
            echo "SPRING_MAIL_USERNAME=$SPRING_MAIL_USERNAME" >> "$ENV_FILE"
            echo "SPRING_MAIL_PASSWORD=$SPRING_MAIL_PASSWORD" >> "$ENV_FILE"
            echo "APP_MAIL_FROM=$APP_MAIL_FROM" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            echo "# ---- Front URL (optionnel) ----" >> "$ENV_FILE"
            echo "FRONT_URL=$FRONT_URL" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            echo "# ---- S3/MinIO (optionnel) ----" >> "$ENV_FILE"
            echo "S3_ENABLED=$S3_ENABLED" >> "$ENV_FILE"
            echo "S3_ENDPOINT=$S3_ENDPOINT" >> "$ENV_FILE"
            echo "S3_REGION=$S3_REGION" >> "$ENV_FILE"
            echo "S3_ACCESS_KEY=$S3_ACCESS_KEY" >> "$ENV_FILE"
            echo "S3_SECRET_KEY=$S3_SECRET_KEY" >> "$ENV_FILE"
            echo "S3_BUCKET=$S3_BUCKET" >> "$ENV_FILE"
            echo "S3_PUBLIC_BASE_URL=$S3_PUBLIC_BASE_URL" >> "$ENV_FILE"

            # Choisit docker compose v2 ou docker-compose (compat)
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            cd "$APP_PATH"
            $DC up -d --build

